[application]
name = "traiteur-website"
default-platform = "fullstack"
# Dossier des fichiers statiques (copiés / hot-reload). Sans ça, dx ne sait pas où prendre public/.
asset_dir = "public"

[web.watcher]
reload_html = true
watch_path  = ["src", "public", "style"]

[serve]
address = "127.0.0.1"
port    = 3000
