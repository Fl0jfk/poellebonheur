# Build Amplify Hosting — Dioxus WASM + Tailwind → dossier dist/
# Les variables API_GATEWAY_URL, ADMIN_PASSWORD, ADMIN_API_KEY doivent être
# définies dans Amplify (Environment variables) : elles sont injectées au build.

version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          set -euo pipefail
          export RUSTUP_HOME="$HOME/.rustup"
          export CARGO_HOME="$HOME/.cargo"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --no-modify-path
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup target add wasm32-unknown-unknown
          cargo install dioxus-cli --version 0.6.3 --locked
          # Tailwind v4 — CLI standalone (pas de Node/npm) : https://tailwindcss.com/blog/standalone-cli
          TAILWIND_VERSION="v4.2.2"
          mkdir -p "$HOME/.local/bin"
          if [ ! -x "$HOME/.local/bin/tailwindcss" ]; then
            curl -fsSL "https://github.com/tailwindlabs/tailwindcss/releases/download/${TAILWIND_VERSION}/tailwindcss-linux-x64" \
              -o "$HOME/.local/bin/tailwindcss"
            chmod +x "$HOME/.local/bin/tailwindcss"
          fi
    build:
      commands:
        # Un seul bloc shell : Amplify exécute chaque entrée de la liste dans un shell neuf,
        # donc variables et cd ne survivent pas d’une ligne à l’autre.
        - |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          export RUSTUP_HOME="$HOME/.rustup"
          export CARGO_HOME="$HOME/.cargo"
          dx build --release --platform web
          PUBLIC_DIR="$(find target/dx -type d -path '*/release/web/public' | head -n 1)"
          test -n "$PUBLIC_DIR"
          # Dioxus 0.6 traite .avif via son pipeline image (ré-encodage) : fichier parfois corrompu
          # → on réécrit les médias bruts depuis public/ par-dessus la sortie du build.
          shopt -s nullglob
          for f in public/*.avif public/*.png public/*.jpg public/*.jpeg public/*.webp; do
            if [ -f "$f" ]; then cp -f "$f" "$PUBLIC_DIR/"; fi
          done
          shopt -u nullglob
          if [ -d public/fonts ]; then cp -Rf public/fonts "$PUBLIC_DIR/"; fi
          tailwindcss -i style/input.css -o "$PUBLIC_DIR/tailwind.css"
          ls -la "$PUBLIC_DIR"
          test -f "$PUBLIC_DIR/tailwind.css"
          mkdir -p dist
          cp -r "$PUBLIC_DIR/." dist/
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - ~/.cargo/registry/**/*
      - ~/.cargo/git/**/*
      - target/**/*
      - ~/.local/bin/tailwindcss
